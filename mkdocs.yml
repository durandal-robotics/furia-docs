site_name: Furia C2 Platform
site_description: Furia C2 Platform — profile-driven C2 host, UI, and marketplace with modular extensions
site_url: https://durandal-robotics.github.io/furia-docs/
repo_url: https://github.com/durandal-robotics/furia-docs
edit_uri: edit/main/docs/

plugins:
  - search
  - mermaid2

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - C2 Templates: c2-templates.md
  - Integrations:
    - ATAK: integrations/atak.md
    - SAPIENT: integrations/sapient.md
    - STANAG 4586: integrations/stanag.md
  - Developer Guide:
    - Building Your Own C2: developer-guide/building-your-own-c2.md
    - Assurance & Proofs: developer-guide/assurance-and-proofs.md
    - SDK Reference: SDK.md
    - Service Port Map: developer-guide/service-ports.md
    - Sizing Guide: developer-guide/sizing-guide.md
    - Troubleshooting: developer-guide/troubleshooting.md
  - UI Components: ui-components/overview.md
  - Tutorials:
    - Building an Extension: tutorials/building-an-extension.md
  - Extensions:
    - Catalog: extensions/catalog.md
    - Simulation: extensions/simulation.md
    - Sensor: extensions/sensor.md
    - Assessment: extensions/assessment.md
    - Policy: extensions/policy.md
  - Architecture:
    - WASM Extensions: adr/001-wasm-extensions.md
    - PostGIS over Neo4j: adr/002-postgis-over-neo4j.md
    - Microservices: adr/003-microservices-over-monolith.md
  - Reference:
    - API Reference: api-reference.md
    - Versions: VERSIONS.md
    - Benchmarks: benchmarks.md
    - Security: security.md
    - C2 Types: c2-types/overview.md
    - Scenario: scenario.md
    - FAQ: faq.md
    - Glossary: glossary.md
    - Screenshots: screenshots/gallery.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/durandal-robotics/furia-docs
